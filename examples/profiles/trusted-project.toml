# Trusted Project Profile
#
# Higher-autonomy profile for well-understood repositories only.

model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "never"
sandbox_mode = "workspace-write"

# Usage:
#   codex --profile trusted
#
# Safety notes:
# - Use only on branches with a clean git safety net.
# - Review `git diff` before any commit or push.
# - Use `danger-full-access` only when a task truly requires unrestricted
#   filesystem or network access and the user explicitly approves that risk.
