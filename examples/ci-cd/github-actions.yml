# Example GitHub Actions workflow for documentation validation and optional
# read-only Codex analysis.
#
# Prerequisites for the optional Codex job:
# - OPENAI_API_KEY configured as a repository secret.
# - A constrained [profiles.ci] profile in .codex/config.toml.
# - CODEX_CLI_VERSION below replaced with a reviewed, pinned version.
# - Maintainer review before enabling any write-capable PR automation.

name: Codex CI Example

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  CODEX_CLI_VERSION: "replace-with-reviewed-version"

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Validate documentation
        run: npm run validate

      - name: Check validator syntax
        run: node --check scripts/validate-docs.mjs

  codex-read-only-analysis:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Install Codex CLI
        run: |
          test "$CODEX_CLI_VERSION" != "replace-with-reviewed-version"
          npm install -g "@openai/codex@${CODEX_CLI_VERSION}"

      - name: Analyze diff without writing
        run: >
          codex --profile ci exec
          "Review the diff against the default branch. Focus on correctness,
          security, missing validation, and documentation drift. Return a
          markdown summary only; do not modify files or post comments."
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
