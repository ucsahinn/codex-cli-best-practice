# Codex CLI Operator Handbook - project configuration
#
# Shared defaults for contributors using this repository. Personal overrides
# belong in ~/.codex/config.toml or one-off CLI flags.
#
# Current source notes live in docs/RESEARCH_NOTES.md.

################################################################################
# Core Settings
################################################################################

model = "gpt-5.5"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

################################################################################
# MCP Servers
################################################################################

[mcp_servers.context7]
enabled = true
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
supports_parallel_tool_calls = true

################################################################################
# Profiles
################################################################################

[profiles.conservative]
model = "gpt-5.5"
model_reasoning_effort = "low"
sandbox_mode = "read-only"
approval_policy = "untrusted"

[profiles.development]
model = "gpt-5.5"
model_reasoning_effort = "medium"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[profiles.deep-research]
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "on-request"

[profiles.trusted]
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
approval_policy = "never"

[profiles.ci]
model = "gpt-5.5"
model_reasoning_effort = "low"
sandbox_mode = "read-only"
approval_policy = "never"

[profiles.review]
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
approval_policy = "on-request"

################################################################################
# Agents
################################################################################

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[agents.weather-agent]
description = "Fetches Istanbul temperature from Open-Meteo and invokes the weather SVG skill."
model = "gpt-5.5"
model_reasoning_effort = "medium"
config_file = "agents/weather-agent.toml"
