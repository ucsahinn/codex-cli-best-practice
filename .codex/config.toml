# Codex CLI — Team-shared project configuration
#
# This file is checked into the repository and provides shared defaults
# for all team members. Personal overrides go in ~/.codex/config.toml
# or use CLI flags (--model, --approval-mode, --config key=value).
#
# Reference: https://developers.openai.com/codex/config-reference/

################################################################################
# Core Settings
################################################################################

# Responsive default for shared docs/config maintenance. Use `codex -m gpt-5.5`
# when a task needs the strongest current Codex model.
model = "gpt-5.4-mini"

# Sandbox mode controls file system and network access.
# Options: "read-only", "workspace-write", "danger-full-access"
sandbox_mode = "workspace-write"

# Approval policy controls when Codex asks before running commands.
# Options: "untrusted", "on-request", "never"
approval_policy = "on-request"

################################################################################
# Features
################################################################################

# Enable lifecycle hooks from .codex/hooks.json. `codex_hooks` is deprecated;
# the canonical feature key is `hooks`.
[features]
hooks = true
# memories = true

################################################################################
# MCP Servers
################################################################################

# MCP (Model Context Protocol) servers extend Codex with external tool access.
# Define servers here so all team members share the same integrations.

[mcp_servers.context7]
enabled = true
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

# --- Example: Streamable HTTP transport ---
# [mcp_servers.remote-tools]
# enabled = true
# url = "https://mcp.example.com/sse"

# --- Example: STDIO server with environment variables ---
# [mcp_servers.database]
# enabled = true
# command = "db-mcp-server"
# args = ["--connection-string", "$DATABASE_URL"]
# env = { DATABASE_URL = "" }

# --- Example: Parallel tool calls (v0.121.0+) ---
# MCP tools are serialized by default. Opt in per server when tools are
# safe to run concurrently (e.g. read-only lookups):
# [mcp_servers.docs]
# enabled = true
# command = "docs-server"
# supports_parallel_tool_calls = true

################################################################################
# Memories (v0.119.0+)
################################################################################

# Cross-session memory pipeline — off by default. Enable and tune here.
# Reset via /memories in the TUI or `codex debug clear-memories`.
# See best-practice/codex-memory.md for the full reference.

# [memories]
# use_memories                     = true
# generate_memories                = true
# no_memories_if_mcp_or_web_search = false

################################################################################
# Profiles
################################################################################

# Profiles are no longer declared under [profiles.<name>] in config.toml.
# Create separate files in CODEX_HOME instead, for example:
#
#   ~/.codex/development.config.toml
#   ~/.codex/conservative.config.toml
#   ~/.codex/trusted-project.config.toml
#
# Then run:
#
#   codex --profile development
#
# See examples/profiles/ for copy-ready profile layers.

################################################################################
# Agents
################################################################################

# Agents are registered in config and can point to dedicated TOML role files.
[agents.weather-agent]
description = "Fetches temperature from Open-Meteo for Dubai and invokes weather-svg-creator skill."
model = "gpt-5.4-mini"
config_file = "agents/weather-agent.toml"
